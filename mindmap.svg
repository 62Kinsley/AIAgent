    .m1-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .m1-txt  { fill: #085041; font-family: sans-serif; font-size: 13px; font-weight: 500; }
    .m2-fill { fill: #FAECE7; stroke: #993C1D; }
    .m2-txt  { fill: #712B13; font-family: sans-serif; font-size: 13px; font-weight: 500; }
