    .conn { fill: none; stroke-width: 1; }
    .c1 { stroke: #1D9E75; }
    .c2 { stroke: #D85A30; }
    .c3 { stroke: #378ADD; }
    .c4 { stroke: #BA7517; }
    .title-txt { fill: #2C2C2A; font-family: sans-serif; font-size: 11px; letter-spacing: 0.08em; }
